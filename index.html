<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuel Consumption</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div style="display: flex">
    <div id="navbar"></div>

    <button onclick="createBike()">+</button>
  </div>

  
  <div class="row" id="bikeNameHolder">
    <b id="bikeName" type="text" onchange="renameBike()"></b>
    <!--<button class="pLeft" onclick="renameBike()">E</button> -->
    <!--<button class="pLeft" onclick="removeBike()">X</button> -->
  </div>

  <div>
    <div class="row" id="newData">
      <input type="number">
      <div>km</div>
      <input class="pLeft" type="number">
      <div>L</div>

      <button class="pLeft" onclick="addData()">+</button>
    </div>
    <table id="content"></table>

  </div>
  

  <div id="datePopup" style="display: none">
    <input type="date" name="" id="">
    <button onclick="closeDatePopup()">X</button>
  </div>


  <script src="index.js"></script>
</body>
</html>
